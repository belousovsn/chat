services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.22
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 10

  xmpp:
    profiles: ["xmpp"]
    image: ghcr.io/processone/ejabberd
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      EJABBERD_MACRO_HOST: ${XMPP_DOMAIN}
      EJABBERD_MACRO_ADMIN: ${XMPP_ADMIN_JID}
      EJABBERD_MACRO_APIJID: ${XMPP_API_USER}
      CTL_ON_CREATE: >-
        ! register xmppadmin ${XMPP_DOMAIN} ${XMPP_ADMIN_PASSWORD} ;
        ! register xmppapi ${XMPP_DOMAIN} ${XMPP_API_PASS} ;
        status
    ports:
      - "5222:5222"
      - "5269:5269"
      - "127.0.0.1:5443:5443"
    volumes:
      - ./ops/xmpp/ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml
      - xmpp-data:/opt/ejabberd/database
    healthcheck:
      test: ["CMD-SHELL", "ejabberdctl status >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "APP_URL=http://127.0.0.1:8080 node apps/server/dist/apps/server/src/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  uploads:
  xmpp-data:
