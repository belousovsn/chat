services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_PORT: 8080
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgres://chat:chat@db:5432/chat
      SESSION_SECRET: local-dev-session-secret
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      APP_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "apps/server/dist/apps/server/src/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  uploads:
