services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 10

  xmpp:
    profiles: ["xmpp"]
    image: ghcr.io/processone/ejabberd
    environment:
      EJABBERD_MACRO_HOST: localhost
      EJABBERD_MACRO_ADMIN: xmppadmin@localhost
      EJABBERD_MACRO_APIJID: xmppapi@localhost
      CTL_ON_CREATE: >-
        ! register xmppadmin localhost xmpp-admin-pass ;
        ! register xmppapi localhost xmpp-api-pass ;
        status
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5443:5443"
    volumes:
      - ./ops/xmpp/ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml
      - xmpp-data:/opt/ejabberd/database
    healthcheck:
      test: ["CMD-SHELL", "ejabberdctl status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_PORT: 8080
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgres://chat:chat@db:5432/chat
      SESSION_SECRET: local-dev-session-secret
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      APP_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
      XMPP_ENABLED: true
      XMPP_DOMAIN: localhost
      XMPP_HOST: localhost
      XMPP_CLIENT_PORT: 5222
      XMPP_FEDERATION_ENABLED: false
      XMPP_FEDERATION_PORT: 5269
      XMPP_ADMIN_PORT: 5443
      XMPP_COMPOSE_PROFILE: xmpp
      XMPP_ADMIN_JID: xmppadmin@localhost
      XMPP_API_BASE_URL: http://xmpp:5281/api
      XMPP_API_USER: xmppapi@localhost
      XMPP_API_PASS: xmpp-api-pass
      XMPP_ADMIN_USERS: alice
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "apps/server/dist/apps/server/src/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  uploads:
  xmpp-data:
